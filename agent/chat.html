<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RemoteCtl 聊天</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;display:flex;flex-direction:column;height:100vh;color:#111}
.header{background:#1a73e8;color:#fff;padding:12px 16px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;user-select:none}
.dot{width:9px;height:9px;border-radius:50%;background:#4caf50;flex-shrink:0;transition:background .3s}
.dot.off{background:#bdbdbd}
.subtitle{font-size:11px;opacity:.75;margin-left:auto}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.messages:empty::after{content:"暂无消息，等待控制端发来消息…";display:block;text-align:center;color:#9e9e9e;font-size:13px;padding-top:40px}
.row{display:flex;flex-direction:column;max-width:70%}
.row.viewer{align-self:flex-start}
.row.agent{align-self:flex-end;align-items:flex-end}
.who{font-size:11px;color:#9e9e9e;margin-bottom:3px}
.bubble{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.viewer .bubble{background:#fff;border:1px solid #e0e0e0;border-bottom-left-radius:4px}
.agent .bubble{background:#1a73e8;color:#fff;border-bottom-right-radius:4px}
.ts{font-size:10px;color:#bdbdbd;margin-top:3px}
.file-row{display:flex;align-items:center;gap:8px}
.file-icon{font-size:22px;line-height:1}
.file-info{display:flex;flex-direction:column;gap:2px}
.file-info a{font-size:13px;text-decoration:none;color:inherit;border-bottom:1px solid rgba(0,0,0,.2)}
.agent .file-info a{border-bottom-color:rgba(255,255,255,.4)}
.file-size{font-size:11px;opacity:.6}
.img-preview{max-width:220px;max-height:220px;border-radius:10px;display:block;cursor:pointer}
audio{max-width:240px;height:36px;display:block}
.input-bar{background:#fff;border-top:1px solid #e0e0e0;padding:10px 12px;display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;border:1px solid #dadce0;border-radius:20px;padding:8px 14px;font-size:14px;resize:none;outline:none;max-height:120px;min-height:40px;font-family:inherit;line-height:1.5}
textarea:focus{border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.15)}
.send-btn{background:#1a73e8;color:#fff;border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.send-btn:hover{background:#1557b0}
.send-btn:disabled{background:#dadce0;cursor:default}
.send-btn svg{width:18px;height:18px;fill:#fff}
</style>
</head>
<body>
<div class="header">
  <div class="dot off" id="dot"></div>
  RemoteCtl 聊天
  <span class="subtitle" id="sub">连接中…</span>
</div>
<div class="messages" id="msgs"></div>
<div class="input-bar">
  <textarea id="inp" placeholder="输入消息，Enter 发送，Shift+Enter 换行" rows="1"></textarea>
  <button class="send-btn" id="sendBtn" disabled>
    <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
  </button>
</div>
<script>
const msgs = document.getElementById('msgs');
const inp  = document.getElementById('inp');
const btn  = document.getElementById('sendBtn');
const dot  = document.getElementById('dot');
const sub  = document.getElementById('sub');
let ws, connected = false;

function fmt(ts){
  const d = new Date(ts||Date.now());
  return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}

function humanSize(n){
  if(!n) return '';
  if(n<1024) return n+'B';
  if(n<1048576) return (n/1024).toFixed(1)+'KB';
  return (n/1048576).toFixed(1)+'MB';
}

function addMsg(m){
  const row = document.createElement('div');
  row.className = 'row '+(m.from==='agent'?'agent':'viewer');

  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = m.from==='agent'?'我 (被控端)':'控制端';
  row.appendChild(who);

  const bub = document.createElement('div');
  bub.className = 'bubble';

  if(m.type==='text'){
    bub.textContent = m.text;
  } else if(m.type==='file'){
    const isAudio = m.mime&&m.mime.startsWith('audio/');
    const isImage = m.mime&&m.mime.startsWith('image/');
    if(isAudio){
      const a = document.createElement('audio');
      a.controls = true;
      a.src = m.fileURL;
      bub.appendChild(a);
    } else if(isImage){
      const img = document.createElement('img');
      img.className = 'img-preview';
      img.src = m.fileURL;
      img.onclick = ()=>window.open(m.fileURL,'_blank');
      bub.appendChild(img);
      if(m.name){
        const n=document.createElement('div');
        n.style.cssText='font-size:11px;opacity:.6;margin-top:4px';
        n.textContent=m.name;
        bub.appendChild(n);
      }
    } else {
      const fr = document.createElement('div');
      fr.className = 'file-row';
      const ic = document.createElement('span');
      ic.className = 'file-icon';
      ic.textContent = '📎';
      const fi = document.createElement('div');
      fi.className = 'file-info';
      const a = document.createElement('a');
      a.href = m.fileURL;
      a.download = m.name||'file';
      a.textContent = m.name||'文件';
      const sz = document.createElement('span');
      sz.className = 'file-size';
      sz.textContent = humanSize(m.size);
      fi.appendChild(a);
      fi.appendChild(sz);
      fr.appendChild(ic);
      fr.appendChild(fi);
      bub.appendChild(fr);
    }
  }

  row.appendChild(bub);
  const ts = document.createElement('div');
  ts.className = 'ts';
  ts.textContent = fmt(m.ts);
  row.appendChild(ts);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function send(){
  const text = inp.value.trim();
  if(!text||!connected) return;
  ws.send(JSON.stringify({type:'text',text}));
  inp.value='';
  inp.style.height='auto';
}

inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});
inp.addEventListener('input',()=>{
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,120)+'px';
});
btn.addEventListener('click',send);

function connect(){
  ws = new WebSocket('ws://'+location.host+'/ws');
  ws.onopen=()=>{
    connected=true;
    dot.className='dot';
    sub.textContent='已连接';
    btn.disabled=false;
  };
  ws.onclose=()=>{
    connected=false;
    dot.className='dot off';
    sub.textContent='已断开，重连中…';
    btn.disabled=true;
    setTimeout(connect,2000);
  };
  ws.onmessage=e=>{
    try{ addMsg(JSON.parse(e.data)); }catch(_){}
  };
}
connect();
</script>
</body>
</html>
